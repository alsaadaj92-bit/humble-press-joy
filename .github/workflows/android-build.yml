name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform + patch manifest
        run: node scripts/prepare-android.mjs

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist-apk/localphotos-pro-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: localphotos-pro-v${{ steps.version.outputs.version }}
          path: dist-apk/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-apk/*.apk
          generate_release_notes: true
