name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute auto version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          MAJOR_MINOR=$(echo "$BASE" | awk -F. '{print $1"."$2}')
          VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version v$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # === توقيع ثابت للأبد ===
      # الأولوية: (1) Secret اسمه ANDROID_KEYSTORE_BASE64 إن وُجد
      #           (2) Cache للـ keystore (احتياطي)
      #           (3) توليد جديد (آخر ملاذ — سيكسر التحديث لمرة واحدة فقط)
      - name: Restore keystore from GitHub Secret
        id: keystore_secret
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          echo "source=secret" >> "$GITHUB_OUTPUT"

      - name: Restore keystore from cache (fallback)
        id: keystore_cache
        if: steps.keystore_secret.outputs.source != 'secret'
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Generate keystore if none exists
        if: steps.keystore_secret.outputs.source != 'secret' && steps.keystore_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Export keystore as artifact (so you can save it as a secret)
        if: steps.keystore_secret.outputs.source != 'secret'
        run: |
          base64 -w0 ~/.android/debug.keystore > /tmp/keystore.b64
          echo "::warning::keystore ليس في Secret. حمّل الـ artifact 'debug-keystore-base64' وضع محتواه في Secret اسمه ANDROID_KEYSTORE_BASE64 لضمان التحديث الدائم."

      - name: Upload keystore artifact (one-time bootstrap)
        if: steps.keystore_secret.outputs.source != 'secret'
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore-base64
          path: /tmp/keystore.b64
          retention-days: 90


      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Write version into package.json
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform + patch manifest
        run: node scripts/prepare-android.mjs

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist-apk/localphotos-pro-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: localphotos-pro-v${{ steps.version.outputs.version }}
          path: dist-apk/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist-apk/*.apk
          generate_release_notes: true
          make_latest: true
